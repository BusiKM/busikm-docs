      <text x="36" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="white" opacity="0.7">Dla biur rachunkowych</text>
      <text x="36" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" letter-spacing="-1">3 miesi&#261;ce gratis</text>
