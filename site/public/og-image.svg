<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FAFBFF"/>
      <stop offset="100%" stop-color="#F0F4FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#005CE8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#005CE8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#005CE8" stroke-width="1" transform="translate(100,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#005CE8" stroke-width="1" transform="translate(200,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#005CE8" stroke-width="1" transform="translate(300,0)"/>
    <line x1="0" y1="0" x2="0" y2="630" stroke="#005CE8" stroke-width="1" transform="translate(400,0)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#005CE8" stroke-width="1" transform="translate(0,100)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#005CE8" stroke-width="1" transform="translate(0,200)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#005CE8" stroke-width="1" transform="translate(0,300)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#005CE8" stroke-width="1" transform="translate(0,400)"/>
    <line x1="0" y1="0" x2="1200" y2="0" stroke="#005CE8" stroke-width="1" transform="translate(0,500)"/>
  </g>

  <!-- Decorative route path in background -->
  <path d="M 850 520 C 870 480 900 420 920 380 C 940 340 960 310 990 290 C 1020 270 1050 265 1080 250 C 1110 235 1130 210 1140 180" stroke="#005CE8" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.12"/>
  <path d="M 850 520 C 870 480 900 420 920 380 C 940 340 960 310 990 290 C 1020 270 1050 265 1080 250 C 1110 235 1130 210 1140 180" stroke="#005CE8" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.04"/>
  <circle cx="850" cy="520" r="8" fill="none" stroke="#005CE8" stroke-width="2.5" opacity="0.2"/>
  <circle cx="1140" cy="180" r="10" fill="#005CE8" opacity="0.15"/>

  <path d="M 950 560 C 980 520 1020 470 1060 440 C 1100 410 1120 400 1160 395" stroke="#34C759" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.1"/>

  <!-- Logo mark -->
  <g transform="translate(80, 80)">
    <circle cx="12" cy="52" r="7" fill="none" stroke="#005CE8" stroke-width="4"/>
    <path d="M 12 45 C 12 35 18 25 30 20 C 40 16 46 14 50 14" stroke="#005CE8" stroke-width="4" stroke-linecap="round" fill="none"/>
    <circle cx="50" cy="14" r="10" fill="#005CE8"/>
    <circle cx="47" cy="11" r="3" fill="white" opacity="0.3"/>
  </g>

  <!-- Logo text -->
  <text x="160" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="42" fill="#1D1D1F" letter-spacing="-1">
    <tspan font-weight="500">Busi</tspan><tspan font-weight="800" fill="#005CE8">KM</tspan>
  </text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#1D1D1F" letter-spacing="-2">Kilometrówka,</text>
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#1D1D1F" letter-spacing="-2">która prowadzi się sama.</text>

  <!-- Subtitle -->
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#6E6E73" letter-spacing="-0.3">Automatyczna ewidencja przebiegu pojazdów 2,5–3,5 t.</text>
  <text x="80" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#6E6E73" letter-spacing="-0.3">GPS + AI + eksport do FK. Zgodna z przepisami MF 2026.</text>

  <!-- Stats pills -->
  <g transform="translate(80, 480)">
    <rect width="160" height="44" rx="22" fill="#005CE8" opacity="0.08"/>
    <text x="80" y="28" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#005CE8">300 000 pojazdów</text>
  </g>
  <g transform="translate(260, 480)">
    <rect width="140" height="44" rx="22" fill="#34C759" opacity="0.08"/>
    <text x="70" y="28" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#34C759">80 000 firm</text>
  </g>
  <g transform="translate(420, 480)">
    <rect width="180" height="44" rx="22" fill="#FF3B30" opacity="0.08"/>
    <text x="90" y="28" text-anchor="middle" font-family="system-ui" font-size="15" font-weight="700" fill="#FF3B30">kara do 30 000 zł</text>
  </g>

  <!-- Domain -->
  <text x="80" y="580" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#86868B" letter-spacing="0.5">busikm.pl</text>

  <!-- Bottom accent line -->
  <rect x="0" y="622" width="1200" height="8" fill="#005CE8"/>
</svg>
