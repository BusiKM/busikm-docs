  <!-- Logo -->
  <g transform="translate(80, 60) scale(2.2)">
    <circle cx="16" cy="16" r="15.74" fill="#005CE8"/>
    <circle cx="8.83" cy="23.17" r="2.21" fill="none" stroke="#fff" stroke-width="1.54"/>
    <path d="M8.83,20.96c0-3.31,2.21-6.62,6.62-8.82,3.31-1.65,5.51-2.21,6.62-2.21" fill="none" stroke="#fff" stroke-linecap="round" stroke-width="1.54"/>
    <path d="M25.37,9.94c0,1.82-1.49,3.31-3.31,3.31-1.57,0-2.9-1.1-3.23-2.58-.05-.23-.08-.48-.08-.73,0-1.82,1.48-3.31,3.31-3.31s3.31,1.49,3.31,3.31Z" fill="#fff"/>
  </g>
  <text x="165" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#1D1D1F" letter-spacing="-0.5">BusiKM</text>

  <!-- Main headline -->
  <text x="80" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#1D1D1F" letter-spacing="-2.5">Automatyzuj</text>
  <text x="80" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#1D1D1F" letter-spacing="-2.5">kilometr&#243;wk&#281;</text>
  <text x="80" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="62" font-weight="700" fill="#005CE8" letter-spacing="-2.5">swoich klient&#243;w.</text>

  <!-- Subtitle -->
  <text x="80" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#6E6E73">GPS + eksport do Insert GT, Comarch, Symfonia</text>

  <!-- Bottom -->
  <text x="80" y="570" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#86868B">busikm.pl</text>
  <rect x="80" y="530" width="100" height="3" rx="1.5" fill="#005CE8" opacity="0.3"/>
  <text x="1120" y="570" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#86868B">Web &#183; iOS &#183; Android</text>

  <!-- RIGHT SIDE — 3 stat cards stacked -->
  <g transform="translate(700, 120)">
