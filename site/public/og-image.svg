      <text x="96" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#86868B">Dla firm Twoich klient&#243;w</text>
      <text x="96" y="86" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#34C759" letter-spacing="-1">0 z&#322;</text>
